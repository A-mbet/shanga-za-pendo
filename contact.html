<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact us</title>
    <!-- page specific css -->
    <link rel="stylesheet" href="css/contact.css">
</head>
<body>
    </div class="nav-buttons" style="position: fixed; top: 12px; left: 12px; display: flex; gap: 10px; z-index: 999;">
        <button class="nav-btn" onclick="window.location.href='index.html'">← Back</button>
        <button class="nav-btn primary" onclick="window.location.href='index.html'">Home</button>

    <section class="contact-page">
    <h2>Contact Us</h2>
    <p class="intro-text">We’d love to hear from you! Reach out for orders, questions, or collaborations.</p>

    <div class="contact-container">
    <!-- Contact Form -->
    <form class="contact-form" action="https://formspree.io/f/xojkpbno" method="POST" id="contactForm">
        <input type="hidden" name="_subject" value="New contact form submission from Shanga By Pendo">
        <input type="hidden" name="_next" value="https://shangazapendo.com/thank-you.html">

        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Your Email</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>
    
    <!-- privacy and terms checkbox -->
    <div>
        <input type="checkbox" id="agree" name="agree" required>
        <label for="agree">
            I agree to the 
            <a href="privacy.html" target="_blank">Privacy Policy</a> 
            and 
            <a href="terms.html" target="_blank">Terms of Use</a>.
        </label>
    </div>

        <button type="submit">Send Message</button>
    </form>

    <!-- Contact Info -->
    <div class="contact-info">
        <h3>Get in Touch</h3>
        <p><strong>Phone:</strong> <a href="tel:+254707197141">+254 707 197 141</a></p>
        <p><strong>Email:</strong> <a href="mailto:shangazapendo@gmail.com">shangazapendo@gmail.com</a></p>
        <p><strong>WhatsApp:</strong> <a href="https://wa.me/254707197141?text=Hello%20Shanga%20Za%20Pendo!">Chat with us</a></p>
        <p><strong>Instagram:</strong> <a href="https://www.instagram.com/shanga.za.pendo?igsh=MXVtZHpiNWlkN3VucA==" target="_blank">@shanga.za.pendo</a></p>
    </div>
    </div>
</section>

</html>
