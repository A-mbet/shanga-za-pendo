<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact</title>
    <style>
        :root {
            --primary: #d62828;
            --secondary: #003049;
            --accent: #f5b400;
            --bg: linear-gradient(120deg, #eef6ff 0%, #fef8ec 50%, #f1f7f9 100%);
            --card: #ffffff;
            --shadow: rgba(0, 0, 0, 0.15);
            --text: #1f2a37;
            --muted: #5b708f;
            --radius: 16px;
            --transition: 0.2s ease;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background: var(--bg);
            min-height: 100vh;
            line-height: 1.6;
        }

        .contact-page {
            padding: 50px 20px;
            text-align: center;
            background: linear-gradient(150deg, rgba(255,255,255,0.9), rgba(255,235,215,0.6));
            box-shadow: 0 10px 30px var(--shadow);
            border-radius: var(--radius);
            max-width: 1000px;
            margin: 40px auto;
            border: 1px solid rgba(48,57,73,.10);
        }

        .contact-page h2 {
            color: var(--primary);
            font-size: clamp(2rem, 3.3vw, 2.7rem);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: .08em;
        }

        .intro-text {
            color: var(--muted);
            max-width: 700px;
            margin: 0 auto 25px;
            font-size: 1.1rem;
        }

        .contact-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
            align-items: start;
            animation: slideIn 0.8s ease forwards;
        }

        .contact-form, .contact-info {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: 0 10px 24px var(--shadow);
            border: 1px solid rgba(0,0,0,0.08);
            padding: 24px;
        }

        .contact-form label {
            display: block;
            text-align: left;
            margin-bottom: 8px;
            color: var(--secondary);
            font-weight: 600;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #cbe0f7;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 1rem;
            transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(214,40,40,.12);
            transform: translateY(-1px);
            outline: none;
        }

        .contact-form button {
            width: 100%;
            font-size: 1.05rem;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
        }

        .contact-form button:hover {
            background: #b22222;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0,0,0,.2);
        }

        .contact-info h3 {
            color: var(--secondary);
            margin-bottom: 18px;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: .05em;
        }

        .contact-info p {
            text-align: left;
            margin: 10px 0;
            color: var(--text);
        }

        .contact-info a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .contact-info a:hover {
            text-decoration: underline;
        }

        @media (max-width: 900px) {
            .contact-container { grid-template-columns: 1fr; }
            .contact-page { padding: 30px 14px; }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <section class="contact-page">
    <h2>Contact Us</h2>
    <p class="intro-text">We’d love to hear from you! Reach out for orders, questions, or collaborations.</p>

    <div class="contact-container">
    <!-- Contact Form -->
    <form class="contact-form" action="https://formspree.io/f/mzegvrez" method="POST" id="contactForm">
        <input type="hidden" name="_subject" value="New contact form submission from Shanga By Pendo">
        <input type="hidden" name="_next" value="https://shangazapendo.github.io/thank-you.html">

        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Your Email</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit">Send Message</button>
    </form>

    <!-- Contact Info -->
    <div class="contact-info">
        <h3>Get in Touch</h3>
        <p><strong>Phone:</strong> <a href="tel:+254796722480">+254 796 722 480</a></p>
        <p><strong>Email:</strong> <a href="mailto:shangazapendo@gmail.com">shangazapendo@gmail.com</a></p>
        <p><strong>WhatsApp:</strong> <a href="https://wa.me/254796722480?text=Hello%20Shanga%20Za%20Pendo!">Chat with us</a></p>
        <p><strong>Instagram:</strong> <a href="https://www.instagram.com/shanga.za.pendo?igsh=MXVtZHpiNWlkN3VucA==" target="_blank">@shanga.za.pendo</a></p>
    </div>
    </div>
</section>

    <script>
        const contactForm = document.querySelector('#contactForm');

        contactForm.addEventListener('submit', function(event) {
            event.preventDefault();
            const formData = new FormData(this);

            fetch(this.action, {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                const name = document.getElementById('name').value.trim();
                let messageBox = this.querySelector('.status-message');
                if (!messageBox) {
                    messageBox = document.createElement('div');
                    messageBox.classList.add('status-message');
                    messageBox.style.padding = '12px 16px';
                    messageBox.style.borderRadius = '8px';
                    messageBox.style.marginBottom = '16px';
                }

                if (response.ok) {
                    messageBox.textContent = `Thanks ${name || 'friend'}! Your message has been sent.`;
                    messageBox.style.background = 'linear-gradient(120deg, #d0f1ff, #ffebc3)';
                    messageBox.style.color = '#0e2143';
                    messageBox.style.border = '1px solid #82c7ff';
                    this.prepend(messageBox);

                    // Open WhatsApp chat with the same message too
                    const number = '254796722480';
                    const message = `Hello Shanga Za Pendo!\nName: ${name || 'N/A'}\nEmail: ${document.getElementById('email').value.trim() || 'N/A'}\nMessage: ${document.getElementById('message').value.trim() || 'N/A'}`;
                    const waUrl = `https://wa.me/${number}?text=${encodeURIComponent(message)}`;
                    window.open(waUrl, '_blank');

                    this.reset();
                } else {
                    messageBox.textContent = 'Oops! Something went wrong. Please try again.';
                    messageBox.style.background = '#fde8e8';
                    messageBox.style.color = '#7f1d1d';
                    messageBox.style.border = '1px solid #fca5a5';
                    this.prepend(messageBox);
                }
            }).catch(() => {
                let messageBox = this.querySelector('.status-message');
                if (!messageBox) {
                    messageBox = document.createElement('div');
                    messageBox.classList.add('status-message');
                    messageBox.style.padding = '12px 16px';
                    messageBox.style.borderRadius = '8px';
                    messageBox.style.marginBottom = '16px';
                }
                messageBox.textContent = 'Network error. Please check your connection and try again.';
                messageBox.style.background = '#fde8e8';
                messageBox.style.color = '#7f1d1d';
                messageBox.style.border = '1px solid #fca5a5';
                this.prepend(messageBox);
            });
        });

        document.querySelectorAll('.contact-info a').forEach(a => {
            a.style.transition = 'transform .2s ease';
            a.addEventListener('mouseover', () => {
                a.style.transform = 'scale(1.05)';
            });
            a.addEventListener('mouseout', () => {
                a.style.transform = 'scale(1)';
            });
        });
    </script>

</body>
</html>
